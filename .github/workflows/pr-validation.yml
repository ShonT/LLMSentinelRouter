name: PR Validation

on:
  pull_request:
  pull_request_target:
  push:
    branches:
      - main
      - '**'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Format check (black)
        run: |
          black --check sentinelrouter tests

      - name: Type check (mypy)
        run: |
          mypy --ignore-missing-imports --ignore-errors sentinelrouter

      - name: Unit tests
        run: |
          bash run_tests.sh --unit

      - name: Integration tests
        if: >-
          ${{
            secrets.DEEPSEEK_API_KEY != '' &&
            secrets.ANTHROPIC_API_KEY != '' &&
            secrets.GEMINI_BACKUP1_API_KEY != '' &&
            secrets.GEMINI_BACKUP2_API_KEY != '' &&
            secrets.GROQ_API_KEY != '' &&
            secrets.OPENROUTER_API_KEY != ''
          }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_BACKUP1_API_KEY: ${{ secrets.GEMINI_BACKUP1_API_KEY }}
          GEMINI_BACKUP2_API_KEY: ${{ secrets.GEMINI_BACKUP2_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          bash run_tests.sh --integration
