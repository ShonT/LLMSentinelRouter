name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Download dependencies
        run: |
          go mod download

      - name: Format check
        run: |
          test -z "$(gofmt -l cmd internal)"

      - name: Unit tests
        run: |
          bash run_tests.sh --unit

      - name: Integration tests
        run: |
          bash run_tests.sh --integration
