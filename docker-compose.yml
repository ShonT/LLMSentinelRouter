services:
  sentinelrouter:
    build: .
    container_name: sentinelrouter
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      # Required API keys (must be provided via .env file or shell)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_BACKUP1_API_KEY=${GEMINI_BACKUP1_API_KEY}
      - GEMINI_BACKUP2_API_KEY=${GEMINI_BACKUP2_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_HTTP_REFERER=${OPENROUTER_HTTP_REFERER:-http://localhost}
      - OPENROUTER_APP_TITLE=${OPENROUTER_APP_TITLE:-LLMSentinelRouter}
      # Core configuration (with defaults)
      - WEAK_MODEL_ID=${WEAK_MODEL_ID:-deepseek-chat}
      - STRONG_MODEL_ID=${STRONG_MODEL_ID:-claude-3-opus-20240229}
      - MAX_COST_PER_SESSION=${MAX_COST_PER_SESSION:-25.0}
      - INITIAL_THRESHOLD=${INITIAL_THRESHOLD:-0.7}
      - ESCALATION_RATE_LIMIT=${ESCALATION_RATE_LIMIT:-0.05}
      - COMPLEXITY_THRESHOLD=${COMPLEXITY_THRESHOLD:-0.5}
      - CONDITIONAL_JUDGE_TIMEOUT_SECONDS=${CONDITIONAL_JUDGE_TIMEOUT_SECONDS:-15}
      - TARGET_ESCALATION_RATE=${TARGET_ESCALATION_RATE:-0.05}
      - ROLLING_WINDOW_SIZE=${ROLLING_WINDOW_SIZE:-20}
      # Database and logging
      - DATABASE_URL=sqlite:////home/sentinel/app/data/sentinelrouter.db
      - SENTINEL_CONFIG_PATH=/home/sentinel/app/config/sentinel_config.json
      - MODELS_CONFIG_PATH=/home/sentinel/app/config/models_config.json
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=/home/sentinel/app/logs/sentinelrouter.log
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN}
      # Feature toggles
      - ENABLE_BUDGET_KILLSWITCH=${ENABLE_BUDGET_KILLSWITCH:-true}
      - ENABLE_CYCLE_DETECTION=${ENABLE_CYCLE_DETECTION:-true}
      - ENABLE_DYNAMIC_THRESHOLD=${ENABLE_DYNAMIC_THRESHOLD:-true}
      - CYCLE_DETECTION_WINDOW_SIZE=${CYCLE_DETECTION_WINDOW_SIZE:-50}
      - CYCLE_DETECTION_SIMHASH_THRESHOLD=${CYCLE_DETECTION_SIMHASH_THRESHOLD:-3}
      - SEMANTIC_CACHE_ENABLED=${SEMANTIC_CACHE_ENABLED:-true}
      - SEMANTIC_CACHE_MIN_SAMPLES=${SEMANTIC_CACHE_MIN_SAMPLES:-3}
      - SEMANTIC_CACHE_CONFIDENCE_THRESHOLD=${SEMANTIC_CACHE_CONFIDENCE_THRESHOLD:-0.75}
      - SEMANTIC_CACHE_TTL_SECONDS=${SEMANTIC_CACHE_TTL_SECONDS:-604800}
      # Server
      - HOST=0.0.0.0
      - PORT=8000
      - DASHBOARD_PORT=8001
    volumes:
      - sentinelrouter_data:/home/sentinel/app/data
      - sentinelrouter_logs:/home/sentinel/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "/usr/local/bin/sentinelrouter", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  sentinelrouter_data:
  sentinelrouter_logs:
